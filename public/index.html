<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spell Book</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1/themes/prism-tomorrow.min.css">
</head>
<body>

  <aside id="sidebar">
    <div class="sidebar-brand">
      <img src="logo.png" alt="Spell Book" class="brand-logo">
      <span class="brand-name">Spell Book</span>
    </div>

    <div class="filter-block">
      <input type="text" id="search" class="search-input" placeholder="Search name, contract, notes…" autocomplete="off">
    </div>

    <div class="filter-block">
      <div class="filter-label">STATUS</div>
      <div id="filter-status" class="filter-chips"></div>
    </div>

    <div class="filter-block">
      <div class="filter-label">LANGUAGE</div>
      <div id="filter-language" class="filter-chips"></div>
    </div>

    <div class="filter-block">
      <div class="filter-label">ORIGIN</div>
      <div id="filter-origin" class="filter-chips"></div>
    </div>

    <div class="filter-block">
      <div class="filter-label">TAGS</div>
      <div id="filter-tags" class="filter-chips"></div>
    </div>

    <button id="clear-filters" class="btn-clear-filters">Clear all filters</button>
    <div class="sidebar-footer">
      <button id="stop-server-btn" class="btn-stop-server" title="Stops the Node process">⏹ Stop server</button>
    </div>
  </aside>

  <div id="layout-main">
    <header id="topbar">
      <span id="entry-count" class="entry-count"></span>
      <select id="sort-select" class="sort-select" title="Sort order">
        <option value="date-desc">Newest first</option>
        <option value="date-asc">Oldest first</option>
        <option value="name-asc">Name A → Z</option>
        <option value="name-desc">Name Z → A</option>
        <option value="status">Status</option>
        <option value="language">Language</option>
      </select>
      <button id="add-btn" class="btn-primary">+ New Entry</button>
    </header>

    <div id="cards-grid"></div>
  </div>

  <!-- Detail side panel -->
  <div id="panel-overlay" class="hidden"></div>
  <div id="detail-panel" class="hidden">
    <div class="panel-topbar">
      <div id="panel-edit-btn"></div>
      <button id="close-detail" class="btn-icon" title="Close (Esc)">&#x2715;</button>
    </div>
    <div id="detail-content"></div>
  </div>

  <!-- Selection bar -->
  <div id="selection-bar" class="hidden">
    <span id="selection-count"></span>
    <button id="clear-selection" class="btn-ghost">Clear</button>
    <button id="delete-selected-btn" class="btn-danger">Delete selected</button>
    <button id="export-btn" class="btn-primary">&#x21E9; Export ZIP</button>
  </div>

  <!-- Add/Edit modal -->
  <div id="modal-overlay" class="hidden">
    <div id="modal">
      <div class="modal-header">
        <h2 id="modal-title">New Entry</h2>
        <button id="modal-close" class="btn-icon">&#x2715;</button>
      </div>
      <div class="modal-body">
        <form id="modal-form" autocomplete="off"></form>
      </div>
      <div class="modal-footer">
        <button id="modal-cancel" class="btn-ghost">Cancel</button>
        <div id="batch-btns" class="batch-btns hidden">
          <button id="make-all-btn" class="btn-ghost">Make All</button>
        </div>
        <button id="modal-save" class="btn-primary">Save Entry</button>
      </div>
    </div>
  </div>

  <!-- Confirm dialog -->
  <div id="confirm-overlay" class="hidden">
    <div id="confirm-dialog">
      <p id="confirm-message"></p>
      <div class="confirm-actions">
        <button id="confirm-cancel" class="btn-ghost">Cancel</button>
        <button id="confirm-ok" class="btn-danger">Delete</button>
      </div>
    </div>
  </div>

  <!-- Toast container -->
  <div id="toast-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/prism.js" data-manual></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/plugins/autoloader/prism-autoloader.min.js"></script>
  <script>
    if (typeof Prism !== 'undefined' && Prism.plugins?.autoloader) {
      Prism.plugins.autoloader.languages_path = 'https://cdn.jsdelivr.net/npm/prismjs@1/components/';
    }
  </script>
  <script src="app.js"></script>
</body>
</html>
