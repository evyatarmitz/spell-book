<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spell Book</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="prism/prism-tomorrow.min.css">
</head>
<body>

  <aside id="sidebar">
    <div class="sidebar-brand">
      <img src="logo.png" alt="Spell Book" class="brand-logo">
      <span class="brand-name">Spell Book</span>
    </div>

    <div class="filter-block">
      <input type="text" id="search" class="search-input" placeholder="Search name, contract, notes…" autocomplete="off">
    </div>

    <div class="filter-block">
      <div class="filter-label">STATUS</div>
      <div id="filter-status" class="filter-chips"></div>
    </div>

    <div class="filter-block">
      <div class="filter-label">LANGUAGE</div>
      <div id="filter-language" class="filter-chips"></div>
    </div>

    <div class="filter-block">
      <div class="filter-label">ORIGIN</div>
      <div id="filter-origin" class="filter-chips"></div>
    </div>

    <div class="filter-block">
      <div class="filter-label">TAGS</div>
      <div id="filter-tags" class="filter-chips"></div>
    </div>

    <button id="clear-filters" class="btn-clear-filters">Clear all filters</button>
    <div class="sidebar-footer">
      <div class="lib-path-block">
        <div class="filter-label">LIBRARY</div>
        <div id="lib-path-display" class="lib-path-display">Not set</div>
        <button id="lib-path-btn" class="btn-ghost btn-sm">Change…</button>
      </div>
      <div style="margin-top:auto;padding-top:1rem;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between">
        <span style="font-size:0.7rem;opacity:0.4">v1.1.2</span>
        <button id="settings-btn" class="btn-icon" title="Settings" style="font-size:1rem">&#9881;</button>
      </div>
    </div>
  </aside>

  <div id="layout-main">
    <header id="topbar">
      <span id="entry-count" class="entry-count"></span>
      <select id="sort-select" class="sort-select" title="Sort order">
        <option value="date-desc">Newest first</option>
        <option value="date-asc">Oldest first</option>
        <option value="name-asc">Name A → Z</option>
        <option value="name-desc">Name Z → A</option>
        <option value="status">Status</option>
        <option value="language">Language</option>
      </select>
      <button id="add-btn" class="btn-primary">+ New Entry</button>
    </header>

    <div id="cards-grid"></div>
  </div>

  <!-- Detail side panel -->
  <div id="panel-overlay" class="hidden"></div>
  <div id="detail-panel" class="hidden">
    <div class="panel-topbar">
      <div id="panel-edit-btn"></div>
      <button id="close-detail" class="btn-icon" title="Close (Esc)">&#x2715;</button>
    </div>
    <div id="detail-content"></div>
  </div>

  <!-- Selection bar -->
  <div id="selection-bar" class="hidden">
    <span id="selection-count"></span>
    <button id="clear-selection" class="btn-ghost">Clear</button>
    <button id="delete-selected-btn" class="btn-danger">Delete selected</button>
    <button id="export-btn" class="btn-primary">&#x21E9; Export ZIP</button>
  </div>

  <!-- Add/Edit modal -->
  <div id="modal-overlay" class="hidden">
    <div id="modal">
      <div class="modal-header">
        <h2 id="modal-title">New Entry</h2>
        <button id="modal-close" class="btn-icon">&#x2715;</button>
      </div>
      <div class="modal-body">
        <form id="modal-form" autocomplete="off"></form>
      </div>
      <div class="modal-footer">
        <button id="modal-cancel" class="btn-ghost">Cancel</button>
        <div id="batch-btns" class="batch-btns hidden">
          <button id="make-all-btn" class="btn-ghost">Make All</button>
        </div>
        <button id="modal-save" class="btn-primary">Save Entry</button>
      </div>
    </div>
  </div>

  <!-- Settings modal -->
  <div id="settings-overlay" class="hidden">
    <div id="settings-modal" class="modal" style="max-width:420px">
      <div class="modal-header">
        <h2>Settings</h2>
        <button id="settings-close" class="btn-icon">&#x2715;</button>
      </div>
      <div class="modal-body" style="display:flex;flex-direction:column;gap:1.25rem">
        <div>
          <div class="filter-label" style="margin-bottom:0.4rem">LIBRARY FOLDER</div>
          <div style="display:flex;gap:0.5rem;align-items:center">
            <div id="settings-lib-display" style="flex:1;font-size:0.8rem;opacity:0.7;word-break:break-all"></div>
            <button id="settings-lib-btn" class="btn-ghost btn-sm">Change…</button>
          </div>
        </div>
        <div>
          <div class="filter-label" style="margin-bottom:0.4rem">UPDATES</div>
          <div style="display:flex;flex-direction:column;gap:0.5rem">
            <label style="display:flex;align-items:center;gap:0.6rem;cursor:pointer">
              <input type="radio" name="update-mode" value="auto"> Auto-install (download &amp; replace in place)
            </label>
            <label style="display:flex;align-items:center;gap:0.6rem;cursor:pointer">
              <input type="radio" name="update-mode" value="browser"> Open release page in browser
            </label>
          </div>
          <div style="margin-top:0.75rem;display:flex;align-items:center;gap:0.75rem">
            <button id="settings-check-updates" class="btn-ghost btn-sm">Check for updates</button>
            <span id="settings-update-status" style="font-size:0.75rem"></span>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button id="settings-cancel" class="btn-ghost">Cancel</button>
        <button id="settings-save" class="btn-primary">Save</button>
      </div>
    </div>
  </div>

  <!-- Confirm dialog -->
  <div id="confirm-overlay" class="hidden">
    <div id="confirm-dialog">
      <p id="confirm-message"></p>
      <div class="confirm-actions">
        <button id="confirm-cancel" class="btn-ghost">Cancel</button>
        <button id="confirm-ok" class="btn-danger">Delete</button>
      </div>
    </div>
  </div>

  <!-- Toast container -->
  <div id="toast-container"></div>

  <script src="prism/prism.js" data-manual></script>
  <script src="prism/plugins/autoloader/prism-autoloader.min.js"></script>
  <script>
    if (typeof Prism !== 'undefined' && Prism.plugins?.autoloader) {
      Prism.plugins.autoloader.languages_path = 'prism/components/';
    }
  </script>
  <script src="app.js"></script>
</body>
</html>
